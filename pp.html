<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام فواتير الكراج</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #eee; padding: 20px; direction: rtl; }
        .invoice-box { max-width: 800px; margin: auto; padding: 30px; background: #fff; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .header-right h1 { margin: 0; color: #000; font-size: 22px; font-weight: bold; }
        .logo-container { flex: 1; text-align: center; }
        #logo-preview { max-width: 120px; max-height: 100px; display: none; margin: 0 auto; object-fit: contain; }
        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; cursor: pointer; }
        .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .header-left { text-align: left; font-size: 18px; font-weight: bold; line-height: 1.5; }
        .info-table { width: 100%; margin-bottom: 30px; }
        .info-table td { padding: 5px; }
        .info-table input { width: 90%; border: 1px solid #da9009c4; padding: 5px; }
        .big-notes { width: 100%; min-height: 100px; border: 1px solid #da9009c4; padding: 10px; border-radius: 4px; resize: vertical; font-family: Arial; }
        table.items-table { width: 100%; border-collapse: collapse; }
        table.items-table th { background: #c21e1e; color: #fff; padding: 10px; border: 1px solid #444; }
        table.items-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        table.items-table input { width: 90%; border: none; text-align: center; font-size: 1rem; }
        .total-area { margin-top: 30px; text-align: left; font-size: 1.4rem; font-weight: bold; border-top: 2px solid #333; padding-top: 10px; }
        .buttons-container { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: white; }
        .btn-print { background: #d32f2f; color: white; flex-grow: 1; }
        .btn-whatsapp { background: #25D366; color: white; flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; }
        .btn-whatsapp svg { width: 22px; height: 22px; fill: white; }
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .invoice-box { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            input, textarea { border: none !important; outline: none !important; background: transparent !important; }
            .items-table td { border: 1px solid #020202; }
        }
    </style>
</head>
<body>
<div class="invoice-box" id="mainInvoice">
    <div class="header">
        <div class="header-right" style="flex:1;text-align:right;">
            <h1>مركز الالمانية لصيانة السيارات</h1>
        </div>
        <div class="logo-container">
            <div class="upload-btn-wrapper no-print">
                <button class="btn" style="background:#f0f0f0;border:1px dashed #999;font-size:12px;padding:5px 10px;">إدراج شعار</button>
                <input type="file" id="logo-input" accept="image/*" onchange="loadLogo(event)">
            </div>
            <img id="logo-preview" src="" alt="شعار المركز">
        </div>
        <div class="header-left" style="flex:1;text-align:left;">
            <div>جده - حي النزهه....</div>
            <span style="font-size:16px;">الجوال : 966598862537.....</span>
        </div>
    </div>

    <table class="info-table">
        <tr>
            <td><strong>اسم العميل :</strong></td>
            <td><input type="text" id="custName" placeholder="اكتب اسم العميل هنا"></td>
            <td><strong>التاريخ:</strong></td>
            <td><input type="date" id="invDate"></td>
            <td><strong>نوع المركبه:</strong></td>
            <td><input type="text" id="carType" placeholder="مثلاً: بي ام 323i"></td>
        </tr>
        <tr>
            <td><strong>رقم هاتف العميل</strong></td>
            <td><input type="text" id="custPhone" placeholder="05********"></td>
            <td><strong>رقم اللوحة:</strong></td>
            <td><input type="text" id="plateNum" placeholder="الالمانيه 1"></td>
            <td><strong>موديل المركبه:</strong></td>
            <td><input type="text" id="carModel" placeholder="2026 مثالا"></td>
        </tr>
        <tr>
            <td><strong>نوع المركبه</strong></td>
            <td>
                <select id="cars" style="width:100%;padding:5px;border:1px solid #da9009c4;">
                    <option value="سياره">سياره</option>
                    <option value="دراجه ناريه">دراجه ناريه</option>
                    <option value="حافله">حافله</option>
                </select>
            </td>
            <td><strong>الدفع</strong></td>
            <td>
                <select id="payment" style="width:100%;padding:5px;border:1px solid #da9009c4;">
                    <option value="كاش">كاش</option>
                    <option value="شبكه">شبكه(ب البطاقة)</option>
                    <option value="تقسيط">تقسيط</option>
                    <option value="تحويل بنكي">تحويل بنكي</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><strong>الملاحظات :</strong></td>
            <td colspan="5"><textarea class="big-notes" id="notes" placeholder="اكتب الملاحظات هنا بشكل مفصل..."></textarea></td>
        </tr>
    </table>

    <table class="items-table">
        <thead>
            <tr>
                <th>الخدمة</th>
                <th width="100">الكمية</th>
                <th width="150">السعر</th>
                <th width="150">الإجمالي</th>
                <th class="no-print" width="50">حذف</th>
            </tr>
        </thead>
        <tbody id="invoiceBody">
            <tr>
                <td><input type="text" class="service" value=""></td>
                <td><input type="number" class="qty" value="1" oninput="calc()"></td>
                <td><input type="number" class="price" value="0" oninput="calc()"></td>
                <td class="rowTotal">0</td>
                <td class="no-print"><button onclick="this.closest('tr').remove();calc();" style="color:red;border:none;background:none;cursor:pointer;">✖</button></td>
            </tr>
        </tbody>
    </table>

    <div class="no-print" style="margin-top:15px;">
        <button class="btn btn-add" onclick="addRow()">+ حط خدمه اذا بدك</button>
    </div>

    <div class="total-area">
        الإجمالي النهائي: <span id="grandTotal" style="color:#d32f2f;">0</span> ريال
    </div>

    <div class="no-print buttons-container" style="margin-top:30px;border-top:1px dashed #ccc;padding-top:20px;">
        <button class="btn btn-print" onclick="printInvoice()">🖨️ طباعة الفاتورة</button>
        <button class="btn btn-whatsapp" onclick="sendWhatsApp()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            إرسال للعميل عبر واتساب
        </button>
    </div>
</div>

<script>
document.getElementById('invDate').valueAsDate = new Date();

function loadLogo(event) {
    const reader = new FileReader();
    reader.onload = function() {
        const o = document.getElementById('logo-preview');
        o.src = reader.result; o.style.display = 'block';
        localStorage.setItem('garageLogo', reader.result);
    };
    reader.readAsDataURL(event.target.files[0]);
}

window.onload = function() {
    const logo = localStorage.getItem('garageLogo');
    if (logo) { const o = document.getElementById('logo-preview'); o.src = logo; o.style.display = 'block'; }

    const p = new URLSearchParams(window.location.search);
    if (p.has('d')) {
        try {
            const json = JSON.parse(decodeURIComponent(p.get('d')));
            showSharedInvoice(json);
        } catch(e) { console.log(e); }
    }
};

function addRow() {
    document.getElementById('invoiceBody').insertAdjacentHTML('beforeend', `<tr>
        <td><input type="text" class="service" placeholder="وصف الخدمة"></td>
        <td><input type="number" class="qty" value="1" oninput="calc()"></td>
        <td><input type="number" class="price" value="0" oninput="calc()"></td>
        <td class="rowTotal">0</td>
        <td class="no-print"><button onclick="this.closest('tr').remove();calc();" style="color:red;border:none;background:none;cursor:pointer;">✖</button></td>
    </tr>`);
}

function calc() {
    let total = 0;
    document.querySelectorAll('#invoiceBody tr').forEach(row => {
        const s = (+row.querySelector('.qty').value||0) * (+row.querySelector('.price').value||0);
        row.querySelector('.rowTotal').innerText = s.toFixed(2);
        total += s;
    });
    document.getElementById('grandTotal').innerText = total.toFixed(2);
}

function printInvoice() {
    document.querySelectorAll('input,textarea').forEach(i => {
        i.setAttribute('value', i.value);
        if (i.tagName==='TEXTAREA') i.innerHTML = i.value;
    });
    window.print();
}

function sendWhatsApp() {
    const phone = document.getElementById('custPhone').value.trim();
    if (!phone) { alert('الرجاء إدخال رقم هاتف العميل أولاً'); return; }

    const items = [];
    document.querySelectorAll('#invoiceBody tr').forEach(row => {
        const s = row.querySelector('.service')?.value || '';
        const q = row.querySelector('.qty').value;
        const p = row.querySelector('.price').value;
        const t = row.querySelector('.rowTotal').innerText;
        if (s || +p > 0) items.push({s, q, p, t});
    });

    const data = {
        n:  document.getElementById('custName').value,
        d:  document.getElementById('invDate').value,
        ct: document.getElementById('carType').value,
        ph: phone,
        pl: document.getElementById('plateNum').value,
        cm: document.getElementById('carModel').value,
        vk: document.getElementById('cars').value,
        py: document.getElementById('payment').value,
        nt: document.getElementById('notes').value,
        tt: document.getElementById('grandTotal').innerText,
        it: items
    };

    // تشفير صحيح للعربي
    const encoded = encodeURIComponent(JSON.stringify(data));
    const link = 'https://yazoon19921987-lang.github.io/almania-garage/hi.html?d=' + encoded;

    let fp = phone.replace(/\D/g,'');
    if (fp.startsWith('0')) fp = '966' + fp.substring(1);

    const msg = `مرحباً ${data.n} 👋\n\nتفضل فاتورتك من مركز الالمانية لصيانة السيارات 🔧\n\n👇 اضغط على الفاتورة:\n${link}\n\nشكراً لثقتك بنا 🙏`;
    window.open(`https://wa.me/${fp}?text=${encodeURIComponent(msg)}`, '_blank');
}

function showSharedInvoice(data) {
    document.getElementById('mainInvoice').style.display = 'none';

    const rows = (data.it||[]).map(i => `
        <tr>
            <td style="border:1px solid #ddd;padding:10px;text-align:center;">${i.s}</td>
            <td style="border:1px solid #ddd;padding:10px;text-align:center;">${i.q}</td>
            <td style="border:1px solid #ddd;padding:10px;text-align:center;">${i.p}</td>
            <td style="border:1px solid #ddd;padding:10px;text-align:center;">${i.t}</td>
        </tr>`).join('');

    document.body.innerHTML += `
    <div style="max-width:800px;margin:20px auto;padding:30px;background:#fff;border-radius:5px;box-shadow:0 0 10px rgba(0,0,0,0.1);direction:rtl;font-family:Arial;">
        <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #333;padding-bottom:20px;margin-bottom:30px;">
            <div style="flex:1;text-align:right;"><h1 style="margin:0;font-size:22px;">مركز الالمانية لصيانة السيارات</h1></div>
            <div style="flex:1;text-align:left;font-size:16px;font-weight:bold;line-height:1.5;">
                <div>جده - حي النزهه....</div>
                <div>الجوال : 966598862537.....</div>
            </div>
        </div>
        <table style="width:100%;margin-bottom:20px;">
            <tr>
                <td style="padding:6px;"><strong>اسم العميل:</strong> ${data.n}</td>
                <td style="padding:6px;"><strong>التاريخ:</strong> ${data.d}</td>
                <td style="padding:6px;"><strong>نوع المركبه:</strong> ${data.ct}</td>
            </tr>
            <tr>
                <td style="padding:6px;"><strong>رقم الهاتف:</strong> ${data.ph}</td>
                <td style="padding:6px;"><strong>رقم اللوحة:</strong> ${data.pl}</td>
                <td style="padding:6px;"><strong>الموديل:</strong> ${data.cm}</td>
            </tr>
            <tr>
                <td style="padding:6px;"><strong>نوع المركبه:</strong> ${data.vk}</td>
                <td style="padding:6px;"><strong>طريقة الدفع:</strong> ${data.py}</td>
            </tr>
            ${data.nt ? `<tr><td colspan="3" style="padding:6px;"><strong>الملاحظات:</strong> ${data.nt}</td></tr>` : ''}
        </table>
        <table style="width:100%;border-collapse:collapse;">
            <thead><tr>
                <th style="background:#c21e1e;color:#fff;padding:10px;border:1px solid #444;">الخدمة</th>
                <th style="background:#c21e1e;color:#fff;padding:10px;border:1px solid #444;width:100px;">الكمية</th>
                <th style="background:#c21e1e;color:#fff;padding:10px;border:1px solid #444;width:150px;">السعر</th>
                <th style="background:#c21e1e;color:#fff;padding:10px;border:1px solid #444;width:150px;">الإجمالي</th>
            </tr></thead>
            <tbody>${rows}</tbody>
        </table>
        <div style="margin-top:30px;text-align:left;font-size:1.4rem;font-weight:bold;border-top:2px solid #333;padding-top:10px;">
            الإجمالي النهائي: <span style="color:#d32f2f;">${data.tt}</span> ريال
        </div>
        <div style="margin-top:20px;text-align:center;color:#888;font-size:13px;border-top:1px dashed #ccc;padding-top:15px;">
            شكراً لثقتك بمركز الالمانية لصيانة السيارات 🙏
        </div>
    </div>`;
}
</script>
</body>
</html>
