<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام فواتير الكراج </title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #eee; padding: 20px; direction: rtl; }
        .invoice-box { 
            max-width: 800px; 
            margin: auto; 
            padding: 30px; 
            background: #fff; 
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        
        .header-right h1 { margin: 0; color: #000000ec; font-size: 22px; font-weight: bold; }
        
        /* تنسيق مكان الصورة */
        .logo-container {
            flex: 1;
            text-align: center;
            position: relative;
        }
        #logo-preview {
            max-width: 120px;
            max-height: 100px;
            display: none; /* يظهر فقط عند اختيار صورة */
            margin: 0 auto;
            object-fit: contain;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            cursor: pointer;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .header-left { text-align: left; font-size: 18px; font-weight: bold; line-height: 1.5; }
        .header-left .phone { font-size: 16px; display: block; }

        .info-table { width: 100%; margin-bottom: 30px; }
        .info-table td { padding: 5px; }
        .info-table input { width: 90%; border: 1px solid #da9009c4; padding: 5px; }

        .big-notes { 
            width: 100%; 
            min-height: 100px; 
            border: 1px solid #da9009c4; 
            padding: 10px; 
            border-radius: 4px; 
            resize: vertical; 
            font-family: Arial;
        }

        table.items-table { width: 100%; border-collapse: collapse; }
        table.items-table th { background: #c21e1e; color: #ffffff; padding: 10px; border: 1px solid #444; }
        table.items-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        table.items-table input { width: 90%; border: none; text-align: center; font-size: 1rem; }

        .total-area { margin-top: 30px; text-align: left; font-size: 1.4rem; font-weight: bold; border-top: 2px solid #333; padding-top: 10px; }
        
        .buttons-container { margin-top: 20px; display: flex; gap: 10px; }

        .btn { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #28a745; color: white; }
        .btn-print { background: #d32f2f; color: white; flex-grow: 1; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .invoice-box { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            input, textarea { border: none !important; outline: none !important; background: transparent !important; }
            .items-table td { border: 1px solid #020202; }
        }
    </style>
</head>
<body>

<div class="invoice-box">
    <div class="header">
        <div class="header-right" style="flex: 1; text-align: right;">
            <h1>مركز الالمانية لصيانة السيارات</h1>
        </div>
        
        <div class="logo-container">
            <div class="upload-btn-wrapper no-print">
                <button class="btn" style="background: #f0f0f0; border: 1px dashed #999; font-size: 12px; padding: 5px 10px;">إدراج شعار</button>
                <input type="file" id="logo-input" accept="image/*" onchange="loadLogo(event)">
            </div>
            <img id="logo-preview" src="" alt="شعار المركز">
        </div>

        <div class="header-left" style="flex: 1; text-align: left;">
            <div>جده - حي النزهه....</div>
            <span class="phone">
                الجوال : 966598862537.....
            </span>
        </div>
    </div>

    <table class="info-table">
        <tr>
            <td><strong>اسم العميل :</strong></td>
            <td><input type="text" id="custName" placeholder="اكتب اسم العميل هنا"></td>
            <td><strong>التاريخ:</strong></td>
            <td><input type="date" id="invDate"></td>
            <td><strong>نوع المركبه:</strong></td>
            <td><input type="text" placeholder="مثلاً: بي ام 323i"></td>
        </tr>
        <tr>
            <td><strong>رقم هاتف العميل</strong></td>
            <td><input type="text" placeholder="05********"></td>
            <td><strong>رقم اللوحة:</strong></td>
            <td><input type="text" placeholder="الالمانيه 1"></td>
            <td><strong>موديل المركبه:</strong></td>
            <td><input type="text" placeholder="2026 مثالا"></td>
        </tr> 
        <tr>  
            <td><strong>نوع المركبه</strong></td>
            <td>
                <select id="cars" name="cars" style="width: 100%; padding: 5px; border: 1px solid #da9009c4;">
                    <option value="">سياره</option>
                    <option value="y,">دراجه ناريه</option>
                    <option value="y,">حافله</option>
                </select>
            </td>
            <td><strong>الدفع</strong></td>
            <td>
                <select id="payment" name="payment" style="width: 100%; padding: 5px; border: 1px solid #da9009c4;">
                    <option value="">كاش</option>
                    <option value="y,">شبكه(ب البطاقة)</option>
                    <option value="y,">تقسيط</option>
                    <option value="y,">تحويل بنكي</option>
                </select>
            </td>
        </tr>
        <tr>
            <td><strong>الملاحظات :</strong></td>
            <td colspan="5">
                <textarea class="big-notes" placeholder="اكتب الملاحظات هنا بشكل مفصل..."></textarea>
            </td>
        </tr>
    </table>

    <table class="items-table" id="itemsTable">
        <thead>
            <tr>
                <th>الخدمة</th>
                <th width="100">الكمية</th>
                <th width="150">السعر</th>
                <th width="150">الإجمالي</th>
                <th class="no-print" width="50">حذف</th>
            </tr>
        </thead>
        <tbody id="invoiceBody">
            <tr>
                <td><input type="text" value=""></td>
                <td><input type="number" class="qty" value="1" oninput="calc()"></td>
                <td><input type="number" class="price" value="0" oninput="calc()"></td>
                <td class="rowTotal">0</td>
                <td class="no-print"><button onclick="this.parentElement.parentElement.remove(); calc();" style="color:red; border:none; background:none; cursor:pointer;">✖</button></td>
            </tr>
        </tbody>
    </table>

    <div class="no-print" style="margin-top: 15px;">
        <button class="btn btn-add" onclick="addRow()">+ حط خدمه اذا بدك</button>
    </div>

    <div class="total-area">
        <span>الإجمالي النهائي: </span>
        <span id="grandTotal" style="color: #d32f2f;">0</span>
        <span> ريال</span>
    </div>

    <div class="no-print" style="margin-top: 30px; border-top: 1px dashed #ccc; padding-top: 20px;">
        <button class="btn btn-print" onclick="printInvoice()">تحويل إلى فاتورة جاهزة وطباعتها</button>
    </div>

</div>

<script>
    document.getElementById('invDate').valueAsDate = new Date();

    // وظيفة لتحميل الصورة وحفظها
    function loadLogo(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('logo-preview');
            output.src = reader.result;
            output.style.display = 'block';
            // حفظ الصورة في ذاكرة المتصفح
            localStorage.setItem('garageLogo', reader.result);
        };
        reader.readAsDataURL(event.target.files[0]);
    }

    // استعادة الصورة عند فتح الصفحة
    window.onload = function() {
        const savedLogo = localStorage.getItem('garageLogo');
        if (savedLogo) {
            const output = document.getElementById('logo-preview');
            output.src = savedLogo;
            output.style.display = 'block';
        }
    };

    function addRow() {
        const row = `<tr>
            <td><input type="text" placeholder="وصف الخدمة"></td>
            <td><input type="number" class="qty" value="1" oninput="calc()"></td>
            <td><input type="number" class="price" value="0" oninput="calc()"></td>
            <td class="rowTotal">0</td>
            <td class="no-print"><button onclick="this.parentElement.parentElement.remove(); calc();" style="color:red; border:none; background:none; cursor:pointer;">✖</button></td>
        </tr>`;
        document.getElementById('invoiceBody').insertAdjacentHTML('beforeend', row);
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('#invoiceBody tr').forEach(row => {
            const q = row.querySelector('.qty').value || 0;
            const p = row.querySelector('.price').value || 0;
            const rowSum = q * p;
            row.querySelector('.rowTotal').innerText = rowSum.toFixed(2);
            total += rowSum;
        });
        document.getElementById('grandTotal').innerText = total.toFixed(2);
    }

    function printInvoice() {
        document.querySelectorAll('input, textarea').forEach(input => {
            input.setAttribute('value', input.value);
            if(input.tagName === 'TEXTAREA') {
                input.innerHTML = input.value;
            }
        });
        window.print();
    }
</script>

</body>
</html>
